<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="contato.css">
    <title>Contato</title>
    <a href="index.html">
        <button>Voltar</button>
    </a>
</head>
<body>
     <!-- Informações e mapa -->
    <h1>Contato</h1>
    <p>Endereço:</p>
    <P> Av. Mirandópolis, 501 - Vila Pompéia, Campinas - SP, 13050-470</P>
      
    <h2>Telefone:
        <p></p>📞
       <p></p> ☎️
       <p></p> ⏰
       <p></p> 📩

        <!-- Mapa Google -->
<div class="mapa">
    <iframe 
        src="https://www.google.com/maps?q=Av.+Mirandópolis,+501,+Campinas+SP&output=embed"
        allowfullscreen=""
        loading="lazy">
    </iframe>

  <!-- Formulário de contato -->
         <div class="contact-form">
        <form action="#" method="post">
         <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Nome Completo" required>

        <label for="email">E-mail</label>
         <input type="email" id="email" name="email" placeholder="Endereço de e-mail" required>

         <label for="assunto">Assunto</label>
        <select id="assunto" name="assunto">
         <option value="suporte">Suporte</option>
         <option value="cotação">Cotação</option>
         </select>

        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem..." rows="5" required></textarea>

         <button type="submit">ENVIAR</button>
                </form>
            </div>

</div>
</head>
</body>
</html>
