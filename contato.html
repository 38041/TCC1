<header>
  <h1>Solicitar Cotação</h1>
  <p>Mangueiras e Conexões Hidráulicas</p>
</header>

<div class="container">

  <h2>Preencha os dados</h2>

  <form>
    <label>Nome</label>
    <input type="text" placeholder="Seu nome" required>

    <label>Email</label>
    <input type="email" placeholder="seu@email.com" required>

    <label>Telefone</label>
    <input type="tel" placeholder="(00) 00000-0000">

    <label>Produto</label>
    <select>
      <option>Mangueira Hidráulica</option>
      <option>Conexão Reta</option>
      <option>Conexão Curva</option>
      <option>Adaptador</option>
    </select>

    <label>Quantidade</label>
    <input type="number" min="1" placeholder="Ex: 10">

    <label>Descrição</label>
    <textarea placeholder="Detalhes do pedido..."></textarea>

    <button type="submit">Enviar Cotação</button>
  </form>

</div>
