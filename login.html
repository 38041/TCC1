<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">

  <!-- Lado esquerdo -->
  <div class="left"> <!--div usada para organizar conteúdo, do lado esquerdo da página.-->
    <div class="overlay">
      <h1>Bem-vindo</h1>
      
       <img src="/andermaq.png" alt="Logo principal">
    </div>
  </div>

  <!-- Lado direito -->
  <div class="right">
    <div class="login-box">
      <h2>Fazer login</h2>

      <form>
        <div class="input-group">
          <label>Email</label>
          <input type="text" placeholder="Digite seu login...">
        </div>

        <div class="input-group">
          <label>Senha</label>
          <input type="password" placeholder="Digite sua senha...">
        </div>

        <button type="submit">Entrar</button>

        <a href="#" class="forgot"> <a href="cadastro.html">Cadastrar</a>
        </a>
      </form>
    </div>
  </div>

</div>

</body>
</html>
